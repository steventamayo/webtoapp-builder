name: Build WebView APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL del sitio web'
        required: true
      app_name:
        description: 'Nombre de la app'
        required: true
        default: 'Mi App'
      package_name:
        description: 'ID del paquete (ej: com.miempresa.app)'
        required: true
        default: 'com.miapp.app'
      icon_base64:
        description: 'Ícono en base64 (opcional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Apuntar al Android SDK pre-instalado
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Aceptar licencias del SDK
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Configurar valores de la app
        env:
          URL: ${{ github.event.inputs.url }}
          NAME: ${{ github.event.inputs.app_name }}
          PKG: ${{ github.event.inputs.package_name }}
        run: |
          JAVA_SRC="app/src/main/java/com/webtoapp/app/MainActivity.java"

          # 1. URL
          sed -i "s|URL_PLACEHOLDER|${URL}|g" "$JAVA_SRC"

          # 2. Nombre
          sed -i "s|APP_NAME_PLACEHOLDER|${NAME}|g" app/src/main/res/values/strings.xml

          # 3. Package en AndroidManifest
          sed -i "s|com\.webtoapp\.app|${PKG}|g" app/src/main/AndroidManifest.xml

          # 4. applicationId y namespace en build.gradle (por separado)
          sed -i "s|applicationId "com\.webtoapp\.app"|applicationId "${PKG}"|g" app/build.gradle
          sed -i "s|namespace "com\.webtoapp\.app"|namespace "${PKG}"|g" app/build.gradle

          # 5. Package declaration en Java
          sed -i "s|^package com\.webtoapp\.app|package ${PKG}|g" "$JAVA_SRC"

          # 6. Mover archivo Java al path correcto del paquete
          PKG_PATH=$(echo "${PKG}" | tr '.' '/')
          mkdir -p "app/src/main/java/${PKG_PATH}"
          cp "$JAVA_SRC" "app/src/main/java/${PKG_PATH}/MainActivity.java"

      - name: Generar íconos (custom o naranja por defecto)
        env:
          ICON_B64: ${{ github.event.inputs.icon_base64 }}
        run: |
          pip3 install Pillow -q
          python3 << 'PYEOF'
          import os, sys
          from PIL import Image, ImageDraw

          sizes = [
              ('mipmap-mdpi', 48), ('mipmap-hdpi', 72),
              ('mipmap-xhdpi', 96), ('mipmap-xxhdpi', 144),
              ('mipmap-xxxhdpi', 192),
          ]

          icon_b64 = os.environ.get('ICON_B64', '').strip()
          base_img = None

          if icon_b64:
              import base64
              data = icon_b64
              if ',' in data:
                  data = data.split(',')[1]
              rem = len(data) % 4
              if rem:
                  data += '=' * (4 - rem)
              try:
                  img_bytes = base64.b64decode(data)
                  with open('/tmp/icon.png', 'wb') as f:
                      f.write(img_bytes)
                  base_img = Image.open('/tmp/icon.png').convert('RGBA')
                  print('Ícono personalizado cargado correctamente')
              except Exception as e:
                  print(f'No se pudo cargar el ícono custom ({e}), usando naranja por defecto')

          for folder, size in sizes:
              if base_img is not None:
                  img = base_img.resize((size, size), Image.LANCZOS)
              else:
                  # Ícono naranja por defecto con "W"
                  img = Image.new('RGBA', (size, size), (255, 77, 28, 255))
                  draw = ImageDraw.Draw(img)
                  pad = size // 5
                  draw.rectangle(
                      [pad, pad, size - pad, size - pad],
                      outline=(255, 255, 255, 220),
                      width=max(2, size // 18),
                  )
              img.save(f'app/src/main/res/{folder}/ic_launcher.png')
              img.save(f'app/src/main/res/{folder}/ic_launcher_round.png')

          print('Todos los íconos generados correctamente')
          PYEOF

      - name: Compilar APK (debug)
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Verificar APK generado
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            SIZE=$(du -h "$APK" | cut -f1)
            echo "APK generado: $APK ($SIZE)"
          else
            echo "ERROR: No se encontró el APK"
            exit 1
          fi

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error
