name: Build WebView APK

on:
  workflow_dispatch:
    inputs:
      url:
        required: true
      app_name:
        required: true
        default: 'Mi App'
      package_name:
        required: true
        default: 'com.miapp.app'
      icon_base64:
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Configure Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Configure app values
        env:
          APP_URL: ${{ github.event.inputs.url }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_PKG: ${{ github.event.inputs.package_name }}
        run: |
          # Replace URL, name and package everywhere
          find app/src -type f | xargs -I{} sed -i "s|URL_PLACEHOLDER|${APP_URL}|g" {} 2>/dev/null || true
          find app/src -type f | xargs -I{} sed -i "s|APP_NAME_PLACEHOLDER|${APP_NAME}|g" {} 2>/dev/null || true
          find app -type f \( -name "*.java" -o -name "*.xml" -o -name "*.gradle" \) \
            | xargs -I{} sed -i "s|com\.webtoapp\.app|${APP_PKG}|g" {} 2>/dev/null || true

          # Move Java file to correct package path
          PKG_PATH=$(echo "${APP_PKG}" | tr '.' '/')
          mkdir -p "app/src/main/java/${PKG_PATH}"
          SRC="app/src/main/java/com/webtoapp/app/MainActivity.java"
          DST="app/src/main/java/${PKG_PATH}/MainActivity.java"
          [ "$SRC" != "$DST" ] && mv "$SRC" "$DST" || true

      - name: Generate app icons
        env:
          ICON_B64: ${{ github.event.inputs.icon_base64 }}
        run: |
          pip3 install Pillow -q
          python3 - << 'PYEOF'
import os, io, base64
from PIL import Image, ImageDraw

SIZES = [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),
         ('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]

raw = os.environ.get('ICON_B64','').strip()
base = None
if raw:
    try:
        data = raw.split(',')[-1]
        data += '=' * (-len(data) % 4)
        base = Image.open(io.BytesIO(base64.b64decode(data))).convert('RGBA')
        print('Custom icon loaded')
    except Exception as e:
        print(f'Custom icon error ({e}), using default orange')

for folder, size in SIZES:
    os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
    if base:
        img = base.resize((size, size), Image.LANCZOS)
    else:
        img = Image.new('RGBA', (size, size), (255, 77, 28, 255))
        d = ImageDraw.Draw(img)
        p = size // 5
        d.rectangle([p, p, size-p, size-p], outline=(255,255,255,200), width=max(2,size//18))
    img.save(f'app/src/main/res/{folder}/ic_launcher.png')
    img.save(f'app/src/main/res/{folder}/ic_launcher_round.png')

print(f'Icons generated for {len(SIZES)} densities')
PYEOF

      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          [ -f "$APK" ] && echo "✅ APK OK: $(du -h $APK | cut -f1)" || (echo "❌ APK not found" && exit 1)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error
